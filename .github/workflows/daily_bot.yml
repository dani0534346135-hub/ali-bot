name: AliBot Daily Send

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml deep-translator

      - name: Run Bots
        env:
          GREEN_API_ID: ${{ secrets.GREEN_API_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WA_CHAT_ID: ${{ secrets.WA_CHAT_ID }}
          AMAZON_STORE_ID: ${{ secrets.AMAZON_STORE_ID }}
          ADMITAD_BASE64: ${{ secrets.ADMITAD_BASE64 }}
          ADMITAD_WEBSITE_ID: ${{ secrets.ADMITAD_WEBSITE_ID }}
        run: |
          python bot.py
          python aliexpress_bot.py
