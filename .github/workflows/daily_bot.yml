name: AliBot Daily Send

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bots
        env:
          # סודות קיימים (אמזון וואטסאפ)
          GREEN_API_ID: ${{ secrets.GREEN_API_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WA_CHAT_ID: ${{ secrets.WA_CHAT_ID }}
          AMAZON_STORE_ID: ${{ secrets.AMAZON_STORE_ID }}
          # סודות חדשים (אלי-אקספרס / Admitad)
          ADMITAD_CLIENT_ID: ${{ secrets.ADMITAD_CLIENT_ID }}
          ADMITAD_CLIENT_SECRET: ${{ secrets.ADMITAD_CLIENT_SECRET }}
          ADMITAD_BASE64: ${{ secrets.ADMITAD_BASE64 }}
        run: |
          python bot.py
          python aliexpress_bot.py
